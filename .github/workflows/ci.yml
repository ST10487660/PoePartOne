name: C# CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - run: dotnet restore PoePartOne.sln
      - run: dotnet build PoePartOne.sln --configuration Release --no-restore